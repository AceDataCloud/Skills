name: Sync Skills

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Sync to .agents/skills/ and .github/skills/
        run: |
          # Create standard directories
          mkdir -p .agents/skills
          mkdir -p .github/skills

          # Sync skills to both standard paths
          for skill_dir in skills/*/; do
            skill_name=$(basename "$skill_dir")
            cp -r "$skill_dir" ".agents/skills/$skill_name"
            cp -r "$skill_dir" ".github/skills/$skill_name"
          done

      - name: Check for changes
        id: changes
        run: |
          git add .agents/skills .github/skills
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "Ace Data Cloud Dev"
          git config user.email "dev@acedata.cloud"
          git commit -m "sync: update .agents/skills/ and .github/skills/ from skills/"
          git push
