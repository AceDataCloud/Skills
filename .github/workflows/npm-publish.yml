name: Publish to npm

on:
  push:
    branches: [main]
    paths-ignore:
      - .gitignore
      - LICENSE
      - "*.md"
      - ".github/ISSUE_TEMPLATE/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Generate date-based version
        id: version
        run: |
          # npm 要求 semver（3 段），所以用 YYYY.MDD.BUILD 格式
          # 例如 2026.407.0 表示 2026年4月7日第0次构建
          YEAR=$(date +'%Y')
          MMDD=$(date +'%-m%d')
          DATE_PREFIX="${YEAR}.${MMDD}"

          LATEST_BUILD=$(node -e "
            const https = require('https');
            https.get('https://registry.npmjs.org/@acedatacloud/skills', res => {
              let data = '';
              res.on('data', d => data += d);
              res.on('end', () => {
                try {
                  const versions = Object.keys(JSON.parse(data).versions || {});
                  const todayPrefix = '${DATE_PREFIX}.';
                  const todayVersions = versions.filter(v => v.startsWith(todayPrefix));
                  if (todayVersions.length === 0) { console.log(0); return; }
                  const builds = todayVersions.map(v => parseInt(v.split('.')[2] || 0));
                  console.log(Math.max(...builds) + 1);
                } catch(e) { console.log(0); }
              });
            }).on('error', () => console.log(0));
          ")

          VERSION="${DATE_PREFIX}.${LATEST_BUILD}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Generated version: $VERSION"

      - name: Set version
        run: npm version "${{ steps.version.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  create-release:
    name: Create GitHub Release
    if: github.event_name == 'push'
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ needs.publish.outputs.version }}" \
            --title "v${{ needs.publish.outputs.version }}" \
            --generate-notes \
            --repo '${{ github.repository }}' || echo "Release already exists, skipping"
